<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Cyber Simulation Map</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f0f2f5;
  }
  h1 {
    text-align: center;
  }
  #map {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
  }
  .node {
    width: 60px;
    height: 60px;
    margin: 10px;
    border-radius: 50%;
    background-color: #1976d2;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: bold;
    border: 2px solid #0d47a1;
    transition: transform 0.2s;
  }
  .node:hover {
    transform: scale(1.2);
  }
  #scenario-container {
    max-width: 800px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  #scenario-image {
    max-width: 100%;
    height: auto;
    margin: 15px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
  }
  .choice-btn {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    font-size: 16px;
    background-color: #1976d2;
    color: #fff;
  }
  .choice-btn:hover {
    background-color: #1565c0;
  }
  #state {
    margin-top: 20px;
    font-weight: bold;
    text-align: center;
  }
  #outcome {
    margin-top: 10px;
    font-style: italic;
    background: #e3f2fd;
    padding: 10px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<h1>University Cyber Security Simulation</h1>

<div id="map"></div>

<div id="scenario-container">
  <div id="scenario-text"></div>
  <img id="scenario-image" src="" alt="Scenario Image">
  <div id="choices"></div>
  <div id="outcome"></div>
  <div id="state"></div>
</div>

<script src="scenarios.js"></script>
<script>
  const state = {
    budget: 100000,
    security: 100,
    reputation: 100,
    morale: 100
  };

  const scenarioText = document.getElementById('scenario-text');
  const scenarioImage = document.getElementById('scenario-image');
  const choicesDiv = document.getElementById('choices');
  const outcomeDiv = document.getElementById('outcome');
  const stateDiv = document.getElementById('state');
  const mapDiv = document.getElementById('map');

  // Create map nodes
  scenarios.forEach((scenario, idx) => {
    const node = document.createElement('div');
    node.className = 'node';
    node.textContent = idx + 1;
    node.title = `Scenario ${idx + 1}`;
    node.onclick = () => renderScenario(idx);
    mapDiv.appendChild(node);
  });

  function renderScenario(index) {
    const scenario = scenarios[index];
    scenarioText.textContent = scenario.text;
    scenarioImage.src = scenario.image;
    outcomeDiv.textContent = '';
    choicesDiv.innerHTML = '';

    scenario.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.text;
      btn.onclick = () => selectChoice(choice);
      choicesDiv.appendChild(btn);
    });

    renderState();
  }

  function selectChoice(choice) {
    const effects = choice.getEffects(state);
    for (const key in effects) {
      state[key] += effects[key];
    }

    const outcome = choice.getOutcome(state);
    outcomeDiv.textContent = outcome;

    renderState();
  }

  function renderState() {
    stateDiv.textContent = `Budget: £${state.budget} | Security: ${state.security} | Reputation: ${state.reputation} | Morale: ${state.morale}`;
  }

  // Start by showing first scenario automatically
  renderScenario(0);
</script>

</body>
</html>
