<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2D Pokémon-Style Engine</title>
<style>
  body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    border: 2px solid white;
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="320" height="320"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const TILE_SIZE = 32;
const MAP_WIDTH = 20;
const MAP_HEIGHT = 20;
const SPEED = 4;

// --- SAMPLE MAP ---
const map = Array.from({ length: MAP_HEIGHT }, (_, y) =>
  Array.from({ length: MAP_WIDTH }, (_, x) =>
    (x === 0 || y === 0 || x === MAP_WIDTH-1 || y === MAP_HEIGHT-1 || (x % 5 === 0 && y % 3 === 0)) ? 1 : 0
  )
);

// --- LOAD SPRITE ---
const playerImage = new Image();
playerImage.src = "https://i.imgur.com/6X12Q0b.png"; // simple sprite sheet (4x4 grid)

// --- PLAYER ---
const player = {
  x: 2,
  y: 2,
  px: 2 * TILE_SIZE,
  py: 2 * TILE_SIZE,
  targetX: 2,
  targetY: 2,
  moving: false,
  direction: 0, // 0=down,1=left,2=right,3=up
  frame: 0,
  frameTick: 0
};

// --- CAMERA ---
const camera = {
  x: 0,
  y: 0
};

// --- INPUT ---
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// --- UPDATE ---
function update() {
  handleMovement();
  updateCamera();
  updateAnimation();
}

function handleMovement() {
  if (!player.moving) {
    let dx = 0, dy = 0;

    if (keys["ArrowUp"]) { dy = -1; player.direction = 3; }
    else if (keys["ArrowDown"]) { dy = 1; player.direction = 0; }
    else if (keys["ArrowLeft"]) { dx = -1; player.direction = 1; }
    else if (keys["ArrowRight"]) { dx = 1; player.direction = 2; }

    if (dx || dy) {
      const nx = player.x + dx;
      const ny = player.y + dy;

      if (map[ny] && map[ny][nx] === 0) {
        player.targetX = nx;
        player.targetY = ny;
        player.moving = true;
      }
    }
  }

  if (player.moving) {
    const tx = player.targetX * TILE_SIZE;
    const ty = player.targetY * TILE_SIZE;

    const dx = tx - player.px;
    const dy = ty - player.py;

    if (Math.abs(dx) < SPEED && Math.abs(dy) < SPEED) {
      player.px = tx;
      player.py = ty;
      player.x = player.targetX;
      player.y = player.targetY;
      player.moving = false;
    } else {
      player.px += Math.sign(dx) * SPEED;
      player.py += Math.sign(dy) * SPEED;
    }
  }
}

function updateCamera() {
  camera.x = player.px - canvas.width / 2 + TILE_SIZE / 2;
  camera.y = player.py - canvas.height / 2 + TILE_SIZE / 2;
}

function updateAnimation() {
  if (player.moving) {
    player.frameTick++;
    if (player.frameTick > 10) {
      player.frame = (player.frame + 1) % 4;
      player.frameTick = 0;
    }
  } else {
    player.frame = 0;
  }
}

// --- DRAW ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMap();
  drawPlayer();
}

function drawMap() {
  for (let y = 0; y < MAP_HEIGHT; y++) {
    for (let x = 0; x < MAP_WIDTH; x++) {
      const screenX = x * TILE_SIZE - camera.x;
      const screenY = y * TILE_SIZE - camera.y;

      if (map[y][x] === 1) {
        ctx.fillStyle = "#444";
      } else {
        ctx.fillStyle = "#88c070";
      }

      ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    }
  }
}

function drawPlayer() {
  const spriteSize = 32;

  ctx.drawImage(
    playerImage,
    player.frame * spriteSize,
    player.direction * spriteSize,
    spriteSize,
    spriteSize,
    player.px - camera.x,
    player.py - camera.y,
    TILE_SIZE,
    TILE_SIZE
  );
}

// --- LOOP ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

playerImage.onload = () => loop();
</script>

</body>
</html>
