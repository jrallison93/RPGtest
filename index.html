<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISM Scenario Game - Campus Map</title>
<style>
  body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }
  canvas {
    border: 2px solid white;
    image-rendering: pixelated;
    margin-right: 20px;
  }
  .container {
    max-width: 700px;
    background: white;
    padding: 1.5rem;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.10);
  }
  .scores, .scenario, .choices, .outcome, .button-row { margin-bottom: 1rem; }
  .score-card { background: #f8fbff;
      border: 1px solid #e6eefc;
      border-radius: 10px;
      padding: 0.9rem 0.8rem;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .score-label { font-size: 0.9rem;
      font-weight: bold;
      color: #555;
      margin-bottom: 0.4rem; }
  .score-value { font-size: 1.15rem;
      font-weight: bold;
      color: #111;
      margin-bottom: 0.25rem; }
  .choices button { display: block;
      width: 100%;
      margin-bottom: 1rem;
      padding: 1rem 1.1rem;
      border: 1px solid #e6eefc; 
      border-radius: 10px;
      border-left: 6px solid #007bff;
      background:  #f8fbff;
      color: #111;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: background-color 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease, border-color 0.2s ease; }



  
#scenarioModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.45); /* overlay backdrop */
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

#scenarioModal .modal-content {
  max-width: 700px;
  width: 90%;
  background: white;
  padding: 2rem;
  border-radius: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.10);
  max-height: 85vh;
  overflow-y: auto;
}

  
  #scenarioModal h3 { margin-top:0; }
  #scenarioModal button {
    display: block;
      width: 100%;
      margin-bottom: 1rem;
      padding: 1rem 1.1rem;
      border: 1px solid #e6eefc; 
      border-radius: 10px;
      border-left: 6px solid #007bff;
      background:  #f8fbff;
      color: #111;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: background-color 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="640" height="640"></canvas>

<div class="container">
  <div class="scores">
    <div class="score-card">
      <div class="score-label">Budget</div>
      <div class="score-value" id="budget">£500,000</div>
    </div>
    <div class="score-card">
      <div class="score-label">Reputation</div>
      <div class="score-value" id="reputation">100</div>
    </div>
    <div class="score-card">
      <div class="score-label">Security</div>
      <div class="score-value" id="security">100</div>
    </div>
    <div class="score-card">
      <div class="score-label">Staff Morale</div>
      <div class="score-value" id="morale">100</div>

      <div class="inventory">
  <h3>Inventory</h3>
  <ul id="inventory-list"></ul>
</div>
    </div>
  </div>

  <div class="scenario" id="scenario-text"></div>
  <div class="choices" id="choices"></div>
  <div class="outcome" id="outcome-text"></div>
</div>

<div id="scenarioModal">
  <div class="modal-content">

    <div class="scores">
      <div class="score-card">
        <div class="score-label">Budget</div>
        <div class="score-value" id="modal-budget"></div>
      </div>
      <div class="score-card">
        <div class="score-label">Reputation</div>
        <div class="score-value" id="modal-reputation"></div>
      </div>
      <div class="score-card">
        <div class="score-label">Security</div>
        <div class="score-value" id="modal-security"></div>
      </div>
      <div class="score-card">
        <div class="score-label">Staff Morale</div>
        <div class="score-value" id="modal-morale"></div>
      </div>
    </div>

    <div class="scenario" id="scenarioModalText"></div>
    <div class="choices" id="scenarioModalChoices"></div>
    <div class="outcome" id="scenarioModalOutcome"></div>

  </div>
</div>

<script src="scenario-bank.js"></script>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const TILE_SIZE = 32;
function getMapWidth(){
  return currentMap[0].length;
}

function getMapHeight(){
  return currentMap.length;
}
const SPEED = 4;

const TILE = {
  GRASS: 0,
  WALL: 1,
  BUILDING_WALL: 2,
  FLOOR: 3,
  DOOR: 4
};

  
// RAW 30x30 campus map
const RAW_MAP = [
"WWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGBBBBBBBBBBGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGBFFFFFFFFBBBBBGGGGBBBBBBBBBBBBBBBBBBBBBBBBBBBBGGGW",
"WGGGGGGGGGBFFFFFFFFBFFFBBBBBBFFFFFFFFFBFFBFFFFFFFFFFFFFBGGGW",
"WGGGGGGGGGBFFFFFFFFBFFFBFFBFBFFFFFFFFFBBDBFBBBDBBFFFFFFBGGGW",
"WGGGGGGGGGBFFFFFFFFBBDBBBFBDBFFFFFFFFFFFFFFBFFFFBFFFFFFBGGGW",
"WGGGGGGGGGBFFFFFFFFDFFFFDFFFDFFFFFFFFFBBBBDBFFFFBFFFFFFBGGGW",
"WGGGGGGGGGBFFFFFFFFBBBDBBBBDBFFFFFFFFFBFFFFBFFFFBFFFFFFBGGGW",
"WGGGGGGGGGBFFFFFFFFFBFFFFFBFBFFFFFFFFFBBBBBBBBBBBFFFFFFBGGGW",
"WGGGGGGGGGBFFFFFFFFFBFFFFFBFBDBBBBBBBBBGGGGGBFFFBBDBBBBBGGGW",
"WGGGGGGGGGBFFFFFFFFFBFFFFFBDBGGGGGGGGGGGGGGGBFFFBFFFFDGGGGGW",
"WGGGGGGGGGBBBBBBBBBBBFFFFFBGGGGGGGGGGGGGGGGGBFFFBFFBBBBGGGGW",
"WGGGGGGGGGGGGGGGGGGGBBBBBBBGGGGGGGGGGGGGGGGGBFFFBFFDFFBGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGBFFFBFFBFFBGGGGW",
"WGGGGGGGBBBBBBBGGGGGGGGGGGGGGGGGGGGGGGGGGGGGBFFFBFFBFFBGGGGW",
"WGGGGGGGBFFFFFBGGGGGGGGGGGGGGGGGBBBBBGBBBBBBBBBBBFFBBBBGGGGW",
"WGGGGGGGBFFFFFBGGGGGGGGGGGGGGGGGBFFFBBBFFFFFFBFFDFFFFFBGGGGW",
"WGGGGGGGDFFFFFBGGGGGGGGGGGGGGGGGBFFFFFBFFFFFFDFBBBFBBBBGGGGW",
"WGGGGGGGBFFFFFBGGGGGGGGGGGGGGGGGBFFFBDBFFFFFFBFDFFFFFFBGGGGW",
"WGGGGGGGBFFFFFBGGGGGGGGGGGGGGGGGBBBBBGBBBBBBBBFBFFFFFFBGGGGW",
"WGGGGGGGBBBBBBBGGGGGGGGGGGGGGGGGGGGGGGBFFFFFFBFBFFFFFFBGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGBFFFFFFBFBFFFFFFBGGGGW",
"WGGGGGGGGGGGGGGGGWWWGGGWWWWWWWGGGGGGGGBFFFFFFBFBBBBBBBBGGGGW",
"WGGGGGGGGGGGGGGGWWGGGGGGGGGGGWGGGGGGGGBFFFFFFDFDFFFFFBGGGGGW",
"WGGGGGGGGGGGGGGWWGGGGGGGGGGGGWGGGGGGGGBBBBBBBBFBFFFFFBGGGGGW",
"WGGGGGGGGGGGGGWWGGGGGGGGGGGGGWWWWGGGGGBFFFFFFFFBFFFFFBGGGGGW",
"WGGGGGGGGGGGGGWGGGGGGGGGGGGGGGGGWGGGGGBFFFFFFFFBFFFFFBGGGGGW",
"WGGGGGGGGGGGGGWGGGGGGGGGGGGGGGGGWGGGGGBFFFFFFFFBFFFFFBGGGGGW",
"WGGGGGGGGGGGGGWGGGGGGGGGGGGGGGGGBBDBBBBBBBBBBBDBBBBBBBGGGGGW",
"WGGGGGGGGGGGGGBBBBBBBBBBBBBBBGGGBFFFFFFFFFFDFFFFFFFFDGGGGGGW",
"WGGGGGGGGGGGGGBFFFFFFFFFFFFFBGGGBFFBBBBBBBBBFFFBBBBBBGGGGGGW",
"WGGGGGGGGGGGGGBFFFFFFFFFFFFFBGGGBFFBFFFFFFFBFFFBFFFFBGGGGGGW",
"WGGGGGGGGGGGGGBFFFFFFFFFFFFFBBGGBFFBFFFFFFFBFFFDFFFFBGGGGGGW",
"WGGGGGGGGGGGGGBFFFFFFFFFFFFFFBGGBFFBFFFFFFFBFFFBFFFFBGGGGGGW",
"WGGGGGGGGGGGGGBFFFFFFFFFFFFFFBGGBFFBFFFFFFFDFFFBFFFFBGGGGGGW",
"WGGGGGGGGGGGGGBBFFFFFFFFFFFFFBBGBFFBBBBBBBBBBBBBBBBBBGGGGGGW",
"WGGGGGGGGGGGGGGBFFFFBBBBBBBFFFBGBFFBGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGBBBBBBFFFFFBBDBBGBFFBGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGBFFFFFFFFFFFFFBGBFFBGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGDFFFFFFFFFFFFFBBBFFBGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGBFFFFFFFFFFFFFFFBFFBBBBBBBBBBBBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGBFFFFFFFFFFFFFFFBFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGBFFFFFFFFFFFFFFFDFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGBBFFFFFFFFFFFFFFBFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGBFFFFFFFFFFFFFFBFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGBBBBBBBBBBBBBBBBFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGBFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGBFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGBFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGBFFBFFFFFFFFFFBGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGW",
"WWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWWW"
];

  const CHAR_TO_TILE = { W:TILE.WALL, G:TILE.GRASS, B:TILE.BUILDING_WALL, F:TILE.FLOOR, D:TILE.DOOR };

  const campusMap = RAW_MAP.map(row => row.split("").map(c => CHAR_TO_TILE[c] ?? TILE.GRASS));

// Simple building interior map
const BUILDING_MAP_RAW = [
"WWWWWWWWWW",
"WFFFFFFFFW",
"WFFFFFFFFW",
"DFFFFFFFFW",
"WFFFFFFFFW",
"WFFFFFFFFW",
"WWWWWWWWWW"
];

const buildingMap = BUILDING_MAP_RAW.map(row => row.split("").map(c => CHAR_TO_TILE[c] ?? TILE.GRASS));

// Active map
let currentMap = campusMap;
let currentMapName = "campus";
  
// Player inventory
const inventory = [];

// Items on the map
const itemsByMap = {
  campus: [
    {x: 5, y: 5, name: "Keycard", collected: false},
    {x: 12, y: 9, name: "Laptop", collected: false}
  ],
  building: [
    {x: 6, y: 5, name: "Research Notes", collected: false}
  ]
};



  
function checkItems() {
  const items = itemsByMap[currentMapName];

  const item = items.find(i =>
    i.x === player.x &&
    i.y === player.y &&
    !i.collected
  );

  if(item) {
    item.collected = true;
    inventory.push(item.name);
    alert(`You collected: ${item.name}`);
    updateInventoryDisplay();
  }
}

function updateInventoryDisplay() {
  const list = document.getElementById("inventory-list");
  list.innerHTML = "";
  inventory.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  });
}
  
// Player
const playerImage = new Image();
playerImage.src = "Male001_No hair shadow-Mannequin.png";
const player = { x:1, y:1, px:1*TILE_SIZE, py:1*TILE_SIZE, targetX:1, targetY:1, moving:false, direction:0, frame:0, frameTick:0 };
const camera = { x:0, y:0 };

  
// Input
const keys = {};
window.addEventListener("keydown", e=>keys[e.key]=true);
window.addEventListener("keyup", e=>keys[e.key]=false);

// Scenario
let scenarioOpen = false;
let budget=500000, reputation=100, security=100, morale=100;

// Event tiles (placed on walkable spaces)
const eventTilesByMap = {
  campus: [
    {x:3, y:10, scenarioIndex:0, triggered:false},
    {x:12, y:1, scenarioIndex:1, triggered:false},
    {x:22, y:1, scenarioIndex:2, triggered:false},
    {x:22, y:25, scenarioIndex:3, triggered:false}
  ],
  building: [
    {x:5, y:4, scenarioIndex:4, triggered:false}
  ] 
};
  

const doors = [
  // Campus → Building
  {
    from: "campus",
    x: 8,
    y: 19,
    to: "building",
    targetX: 0,
    targetY: 3
  },

  // Building → Campus
  {
    from: "building",
    x: 0,
    y: 3,
    to: "campus",
    targetX: 8,
    targetY: 19
  }
];

  function checkDoorTransition(){
  const door = doors.find(d =>
    d.from === currentMapName &&
    d.x === player.x &&
    d.y === player.y
  );

  if(door){
    // Switch map
    if(door.to === "campus"){
      currentMap = campusMap;
    } else if(door.to === "building"){
      currentMap = buildingMap;
    }

    currentMapName = door.to;

    // Move player to new position
    player.x = door.targetX;
    player.y = door.targetY;
    player.px = door.targetX * TILE_SIZE;
    player.py = door.targetY * TILE_SIZE;
  }
}
  
function update() {
  if(!scenarioOpen) handleMovement();
  updateCamera();
  updateAnimation();
}

  
  function updateModalScores(){
  document.getElementById("modal-budget").textContent = "£" + budget.toLocaleString();
  document.getElementById("modal-reputation").textContent = reputation;
  document.getElementById("modal-security").textContent = security;
  document.getElementById("modal-morale").textContent = morale;
}

function handleMovement() {
  if(!player.moving){
    let dx=0, dy=0;
    if(keys["ArrowUp"]){ dy=-1; player.direction=3; }
    else if(keys["ArrowDown"]){ dy=1; player.direction=0; }
    else if(keys["ArrowLeft"]){ dx=-1; player.direction=1; }
    else if(keys["ArrowRight"]){ dx=1; player.direction=2; }

    if(dx||dy){
      const nx=player.x+dx, ny=player.y+dy;
      if(ny < 0 || ny >= getMapHeight() || nx < 0 || nx >= getMapWidth()) return;
      
      if(currentMap[ny][nx] === TILE.GRASS || currentMap[ny][nx] === TILE.FLOOR || currentMap[ny][nx] === TILE.DOOR){
        player.targetX=nx; 
        player.targetY=ny; 
        player.moving=true;
      }
    }
  }

  if(player.moving){
    const tx=player.targetX*TILE_SIZE, ty=player.targetY*TILE_SIZE;
    const dx=tx-player.px, dy=ty-player.py;
    if(Math.abs(dx)<SPEED && Math.abs(dy)<SPEED){
      player.px=tx; 
      player.py=ty; 
      player.x=player.targetX; 
      player.y=player.targetY; 
      player.moving=false;

      checkEventTile();
      checkDoorTransition();
      checkItems();
      
    } else {
      player.px += Math.sign(dx)*SPEED;
      player.py += Math.sign(dy)*SPEED;
    }
  }
}

function updateCamera(){
  camera.x=player.px-canvas.width/2+TILE_SIZE/2;
  camera.y=player.py-canvas.height/2+TILE_SIZE/2;
}

function updateAnimation(){
  if(player.moving){ 
    player.frameTick++; 
    if(player.frameTick>10){player.frame=(player.frame+1)%4;player.frameTick=0;} 
  } else player.frame=0;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawMap();
  drawDecorations();
  drawPlayer();
}

function drawMap(){
  const items = itemsByMap[currentMapName] || []; // LOCK items for this frame
  const tiles = eventTilesByMap[currentMapName] || [];

  for(let y = 0; y < getMapHeight(); y++){
    for(let x = 0; x < getMapWidth(); x++){

      const screenX = x*TILE_SIZE - camera.x;
      const screenY = y*TILE_SIZE - camera.y;

      // Event tiles
      const tile = tiles.find(t => t.x === x && t.y === y);
      if(tile){
        ctx.fillStyle = tile.triggered ? "#28a745" : "#ff9900";
        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
        if(tile.triggered){
          ctx.fillStyle = "white";
          ctx.font = "16px Arial";
          ctx.fillText("✔", screenX+8, screenY+24);
        }
        continue;
      }

      // Base tiles
      switch(currentMap[y][x]){
        case TILE.GRASS: ctx.fillStyle = "#88c070"; break;
        case TILE.WALL: ctx.fillStyle = "#2f2f2f"; break;
        case TILE.BUILDING_WALL: ctx.fillStyle = "#444"; break;
        case TILE.FLOOR: ctx.fillStyle = "#c2b280"; break;
        case TILE.DOOR: ctx.fillStyle = "#8b5a2b"; break;
        default: ctx.fillStyle = "#000";
      }

      ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);

      // Items (NOW SAFE)
      const mapItem = items.find(i =>
        i.x === x &&
        i.y === y &&
        !i.collected
      );

      if(mapItem){
        ctx.fillStyle = "#ff0";
        ctx.fillRect(screenX + 8, screenY + 8, TILE_SIZE - 16, TILE_SIZE - 16);
      }
    }
  }
}

function drawPlayer(){
  const spriteSize=32;
  ctx.drawImage(playerImage, player.frame*spriteSize, player.direction*spriteSize, spriteSize,spriteSize, player.px-camera.x, player.py-camera.y, TILE_SIZE, TILE_SIZE);
}

const modal = document.getElementById("scenarioModal");
const modalText = document.getElementById("scenarioModalText");
const modalChoices = document.getElementById("scenarioModalChoices");

function checkEventTile(){
  const tiles = eventTilesByMap[currentMapName];

  const tile = tiles.find(t =>
    t.x === player.x &&
    t.y === player.y &&
    !t.triggered
  );

  if(tile){
    tile.triggered = true;
    scenarioOpen = true;
    showScenarioModal(tile.scenarioIndex);
  }
}

function showScenarioModal(index){
  const scenario = scenarios[index];

  // Update scores inside modal
  updateModalScores();

  // Scenario text
  modalText.textContent = scenario.text;

  // Reset UI
  modalChoices.innerHTML = "";
  document.getElementById("scenarioModalOutcome").innerHTML = "";

  scenario.choices.forEach(choice=>{
    const btn = document.createElement("button");
    btn.textContent = choice.text;

    btn.onclick = ()=>{
      const effects = choice.getEffects({budget,reputation,security,morale});
      const outcomeText = choice.getOutcome
        ? choice.getOutcome({budget,reputation,security,morale})
        : "";

      budget = Math.max(0, budget + (effects.budget || 0));
      reputation = Math.max(0, reputation + (effects.reputation || 0));
      security = Math.max(0, security + (effects.security || 0));
      morale = Math.max(0, morale + (effects.morale || 0));

      updateScoreDisplay();
      updateModalScores();   

      document.getElementById("scenarioModalOutcome").innerHTML =
        `<strong>You chose:</strong> ${choice.text}<br><br>${outcomeText}`;

    
      // Remove choice buttons first
modalChoices.innerHTML = "";

// Create Continue button
const continueBtn = document.createElement("button");
continueBtn.textContent = "Continue";

continueBtn.onclick = ()=>{
  modal.style.display = "none";
  scenarioOpen = false;
};

// Add it AFTER clearing
modalChoices.appendChild(continueBtn);


      
    };

    modalChoices.appendChild(btn);
  });

  modal.style.display = "flex"; // IMPORTANT change
}

function updateScoreDisplay(){
  document.getElementById("budget").textContent="£"+budget.toLocaleString();
  document.getElementById("reputation").textContent=reputation;
  document.getElementById("security").textContent=security;
  document.getElementById("morale").textContent=morale;
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
playerImage.onload=()=>loop();
</script>
</body>
</html>
