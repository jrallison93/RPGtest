<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2D Pokémon-Style Engine with Scenario Tiles</title>
<style>
  body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }
  canvas {
    border: 2px solid white;
    image-rendering: pixelated;
  }
  /* Scenario Modal */
  #scenarioModal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: #111;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    display: none;
    width: 300px;
    z-index: 10;
  }
  #scenarioModal h3 {
    margin-top: 0;
    font-size: 1.1rem;
  }
  #scenarioModal button {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border: 1px solid #007bff;
    border-radius: 6px;
    background: #f0f8ff;
    cursor: pointer;
  }
  #scenarioModal button:hover {
    background: #e0f0ff;
  }
  #scoreboard {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-weight: bold;
    z-index: 5;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="320" height="320"></canvas>

<div id="scoreboard">
  Budget: £<span id="budget">500,000</span> |
  Reputation: <span id="reputation">100</span> |
  Security: <span id="security">100</span> |
  Morale: <span id="morale">100</span>
</div>

<div id="scenarioModal">
  <h3 id="scenarioText">Scenario text here</h3>
  <div id="scenarioChoices"></div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const TILE_SIZE = 32;
const MAP_WIDTH = 20;
const MAP_HEIGHT = 20;
const SPEED = 4;

// Sample map: 1 = wall, 0 = floor
const map = Array.from({ length: MAP_HEIGHT }, (_, y) =>
  Array.from({ length: MAP_WIDTH }, (_, x) =>
    (x === 0 || y === 0 || x === MAP_WIDTH-1 || y === MAP_HEIGHT-1 || (x % 5 === 0 && y % 3 === 0)) ? 1 : 0
  )
);

// Load player sprite
const playerImage = new Image();
playerImage.src = "https://i.imgur.com/6X12Q0b.png";

// Player
const player = {
  x: 2, y: 2, px: 2*TILE_SIZE, py: 2*TILE_SIZE,
  targetX: 2, targetY: 2, moving: false,
  direction: 0, frame: 0, frameTick: 0
};

// Camera
const camera = { x:0, y:0 };

// Input
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// Scores
let budget = 500000, reputation = 100, security = 100, morale = 100;

// Scenario event tiles
const eventTiles = [
  { x: 4, y:4, scenario: {
      text: "A security breach has occurred! What do you do?",
      choices: [
        { text: "Hire more security", effects: {budget:-50000, security: +20} },
        { text: "Ignore it", effects: {reputation:-10, security:-20} },
        { text: "Train staff", effects: {morale:+10, security:+5, budget:-10000} }
      ]
  }, triggered:false},
  { x: 7, y:2, scenario: {
      text: "Funding has been cut by management. Your move?",
      choices: [
        { text: "Cut staff perks", effects: {morale:-15, budget:+20000} },
        { text: "Reduce security", effects: {security:-20, budget:+30000} },
        { text: "Seek donations", effects: {reputation:+10, budget:+10000} }
      ]
  }, triggered:false}
];

// --- Main Loop ---
let scenarioOpen = false;

function update() {
  if(!scenarioOpen) handleMovement();
  updateCamera();
  updateAnimation();
}

function handleMovement() {
  if (!player.moving) {
    let dx=0, dy=0;
    if(keys["ArrowUp"]){ dy=-1; player.direction=3; }
    else if(keys["ArrowDown"]){ dy=1; player.direction=0; }
    else if(keys["ArrowLeft"]){ dx=-1; player.direction=1; }
    else if(keys["ArrowRight"]){ dx=1; player.direction=2; }

    if(dx||dy){
      const nx = player.x+dx, ny=player.y+dy;
      if(map[ny] && map[ny][nx]===0){
        player.targetX=nx; player.targetY=ny; player.moving=true;
      }
    }
  }

  if(player.moving){
    const tx=player.targetX*TILE_SIZE, ty=player.targetY*TILE_SIZE;
    const dx=tx-player.px, dy=ty-player.py;
    if(Math.abs(dx)<SPEED && Math.abs(dy)<SPEED){
      player.px=tx; player.py=ty; player.x=player.targetX; player.y=player.targetY; player.moving=false;
      checkEventTile();
    } else {
      player.px += Math.sign(dx)*SPEED;
      player.py += Math.sign(dy)*SPEED;
    }
  }
}

function updateCamera(){
  camera.x = player.px - canvas.width/2 + TILE_SIZE/2;
  camera.y = player.py - canvas.height/2 + TILE_SIZE/2;
}

function updateAnimation(){
  if(player.moving){
    player.frameTick++;
    if(player.frameTick>10){ player.frame=(player.frame+1)%4; player.frameTick=0; }
  } else { player.frame=0; }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawMap();
  drawPlayer();
}

function drawMap(){
  for(let y=0;y<MAP_HEIGHT;y++){
    for(let x=0;x<MAP_WIDTH;x++){
      const screenX = x*TILE_SIZE - camera.x;
      const screenY = y*TILE_SIZE - camera.y;

      // Event tile visualization
      const eventTile = eventTiles.find(t=>t.x===x && t.y===y);
      if(eventTile){
        ctx.fillStyle = eventTile.triggered ? "#28a745" : "#ff9900"; // green or orange
        ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
        if(eventTile.triggered){
          ctx.fillStyle = "white";
          ctx.font = "16px Arial";
          ctx.fillText("✔", screenX+8, screenY+24);
        }
        continue;
      }

      ctx.fillStyle = map[y][x]===1 ? "#444" : "#88c070";
      ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
    }
  }
}

function drawPlayer(){
  const spriteSize=32;
  ctx.drawImage(playerImage,
    player.frame*spriteSize,
    player.direction*spriteSize,
    spriteSize, spriteSize,
    player.px-camera.x, player.py-camera.y,
    TILE_SIZE, TILE_SIZE
  );
}

// --- Check Scenario ---
const modal = document.getElementById("scenarioModal");
const scenarioText = document.getElementById("scenarioText");
const scenarioChoices = document.getElementById("scenarioChoices");

function checkEventTile(){
  const tile = eventTiles.find(t=>t.x===player.x && t.y===player.y && !t.triggered);
  if(tile){
    tile.triggered=true;
    showScenario(tile.scenario);
  }
}

function showScenario(scenario){
  scenarioOpen = true;
  modal.style.display="block";
  scenarioText.textContent = scenario.text;
  scenarioChoices.innerHTML="";
  scenario.choices.forEach(choice=>{
    const btn=document.createElement("button");
    btn.textContent=choice.text;
    btn.onclick=()=>{
      // apply effects
      if(choice.effects.budget) budget += choice.effects.budget;
      if(choice.effects.reputation) reputation += choice.effects.reputation;
      if(choice.effects.security) security += choice.effects.security;
      if(choice.effects.morale) morale += choice.effects.morale;
      updateScoreboard();
      modal.style.display="none";
      scenarioOpen = false;
    };
    scenarioChoices.appendChild(btn);
  });
}

function updateScoreboard(){
  document.getElementById("budget").textContent = budget.toLocaleString();
  document.getElementById("reputation").textContent = reputation;
  document.getElementById("security").textContent = security;
  document.getElementById("morale").textContent = morale;
}

// --- Loop ---
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

playerImage.onload=()=>loop();
</script>

</body>
</html>
